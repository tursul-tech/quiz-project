<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стиль 3: Дерзкий и яркий</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial Black', 'Segoe UI', sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .question-number {
            font-size: 14px;
            color: #ff4444;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 26px;
            color: white;
            margin-bottom: 28px;
            line-height: 1.2;
            text-transform: uppercase;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            background: #222;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            color: #ccc;
            font-family: 'Arial', sans-serif;
        }
        .option:hover {
            border-color: #ff4444;
            color: white;
            background: #2a1a1a;
        }
        .option.selected {
            border-color: #ff4444;
            background: #331111;
            color: #ff4444;
            font-weight: bold;
        }
        .progress {
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-bottom: 28px;
        }
        .progress-bar {
            height: 100%;
            width: 40%;
            background: #ff4444;
            border-radius: 2px;
        }
        .label {
            display: inline-block;
            background: #ff4444;
            color: white;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="progress"><div class="progress-bar"></div></div>
        <div class="label">Вопрос 2</div>
        <h2>Как выглядят ваши идеальные выходные?</h2>
        <div class="options">
            <div class="option">Поход или приключение на свежем воздухе</div>
            <div class="option">Вечеринка или встреча с друзьями</div>
            <div class="option">Йога, медитация и здоровая еда</div>
            <div class="option">Навести порядок и распланировать неделю</div>
        </div>
    </div>
</body>
</html>
