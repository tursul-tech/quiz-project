<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стиль 2: Минималистичный</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
        }
        .question-number {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #999;
            margin-bottom: 24px;
        }
        h2 {
            font-size: 22px;
            color: #222;
            margin-bottom: 32px;
            font-weight: normal;
            line-height: 1.4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            background: transparent;
            border: 1px solid #ddd;
            border-radius: 2px;
            padding: 14px 18px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.15s;
            color: #555;
            font-family: 'Georgia', serif;
        }
        .option:hover {
            border-color: #222;
            color: #222;
        }
        .option.selected {
            background: #222;
            border-color: #222;
            color: white;
        }
        .progress {
            height: 2px;
            background: #e5e5e5;
            margin-bottom: 32px;
        }
        .progress-bar {
            height: 100%;
            width: 40%;
            background: #222;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="progress"><div class="progress-bar"></div></div>
        <div class="question-number">Вопрос 2 из 5</div>
        <h2>Как выглядят ваши идеальные выходные?</h2>
        <div class="options">
            <div class="option">Поход или приключение на свежем воздухе</div>
            <div class="option">Вечеринка или встреча с друзьями</div>
            <div class="option">Йога, медитация и здоровая еда</div>
            <div class="option">Навести порядок и распланировать неделю</div>
        </div>
    </div>
</body>
</html>
